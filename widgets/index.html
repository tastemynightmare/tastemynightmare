<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TMN WIDGETS</title>
        <link rel="stylesheet" href="css/style.css">    
    </head>
    <body>
            
        <!-- WEATHER WIDGET -->

        <div id="weather">

            <img src="images/moon.jpg" alt="moon">

            <p id="condition">Midnight Fog</p>

            <p id="temperature">66°</p>

            <p>The Cove sleeps beneath crimson skies</p>

        </div>

        <!-- CALENDAR WIDGET -->

        <div id="calendar">

            <h5 class="calendar-title">NIGHT COVE EVENTS</h5>

            <p class="calendar-description">
                Upcoming appearances from the darkness.
            </p>

            <div class="event">

                <h5>AUG 10</h5>

                <h4>Vampire Season</h4>

                <p>Birthday ritual + new music drop.</p>

            </div>

            <div class="event featured">

                <h5>OCT 31</h5>

                <h4>Crowning Ceremony</h4>

                <p>Enter the Night Cove.</p>

            </div>

        </div>

        <!-- MUSIC WIDGET -->

        <div id="music">

            <div class="track">

                <img src="images/atc-cover.jpg" alt="album cover">

                <div class="track-info">

                    <h4>Ashelic Rose:</h4>

                    <p>After the Club</p>

                    <a
                        href="music/index.html"
                        class="button">Go To Shadow Stage
                    </a>

                </div>

            </div>

            <div class="gallery">

                <img src="images/event.jpg" alt="">

                <img src="images/event.jpg" alt="">

                <img src="images/event.jpg" alt="">

                <img src="images/event.jpg" alt="">

            </div>

        </div>
        
    </body>
</html>
